<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnterpriseHub</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
    <header class="pageheader">
    <!-- 1. Logo à gauche -->
    <a href="/index.html">
        <img src="/images/colored-logo.svg" alt="EnterpriseHub logo">
    </a>

    <!-- 2. Searchbar au centre -->
    <div class="searchbar">
        <input type="text" placeholder="Search for a business...">
        <button>Search</button>
    </div>

    <!-- 3. Boutons à droite -->
    <div class="rightbuttons">
        <button>Login</button>
        <button>Sign Up</button>
    </div>
</header>
    <main>
        <section id="enterprise-list">
            <div class="card">
                    <h2>B12 Burger Terrebonne</h2>
                    <p>Terrebonne</p>
                    <p>Restaurant</p>
                    <p>4.5</p>
                    <p>Burger Place</p>
                    <button>View Profile</button>
</div>
            </div>
        </section>
    </main>
    <script src="/js/data.js"></script>
</body>
</html>
